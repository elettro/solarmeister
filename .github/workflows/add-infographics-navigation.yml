name: Add Infographics Navigation

on:
  push:
    paths:
      - .github/workflows/add-infographics-navigation.yml

permissions:
  contents: write

jobs:
  update-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add Infographics to shared page headers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          updated = []
          skipped = []

          for path in sorted(Path('.').rglob('index.html')):
              if '.git' in path.parts or path.as_posix() == 'infographics/index.html':
                  continue

              text = path.read_text(encoding='utf-8')
              if '>Infographics</a>' in text:
                  continue
              if 'SolarMeister Brand Home' not in text and 'class="topnav"' not in text:
                  continue

              depth = len(path.parent.parts)
              href = '../' * depth + 'infographics/'
              pattern = re.compile(r'(?P<indent>^[ \t]*)(?P<link><a\b[^>\n]*>One Sheets</a>)[ \t]*$', re.MULTILINE)
              match = pattern.search(text)

              if not match:
                  skipped.append(path.as_posix())
                  continue

              replacement = f'{match.group("indent")}{match.group("link")}\n{match.group("indent")}<a href="{href}">Infographics</a>'
              text = text[:match.start()] + replacement + text[match.end():]
              path.write_text(text, encoding='utf-8')
              updated.append(path.as_posix())

          print('Updated headers:')
          for item in updated:
              print(f'  - {item}')
          if skipped:
              print('Eligible pages skipped because no One Sheets link was found:')
              for item in skipped:
                  print(f'  - {item}')

          if len(updated) < 8:
              raise SystemExit(f'Expected at least 8 shared headers, updated only {len(updated)}')
          PY

      - name: Commit navigation updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No navigation changes were needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*/index.html' index.html
          git commit -m "Add Infographics link to global headers"
          git push
