name: Add Blogs to global navigation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-blogs-nav.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Blogs link to global brand navigation
        shell: python
        run: |
          from pathlib import Path
          import re

          root = Path('.')
          blogs_path = root / 'blogs' / 'index.html'

          global_nav = '''<nav class="topbar" aria-label="SolarMeister brand navigation">
            <a class="brand" href="../index.html">
              <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
              <span>SolarMeister Brand Home</span>
            </a>
            <div class="topnav">
              <a href="../index.html">Logos</a>
              <a href="../index.html#brand">Brand basics</a>
              <a href="../favicon/">Favicons</a>
              <a href="../onesheets/">One Sheets</a>
              <a href="../legal-footer/">Legal Footer</a>
              <a href="../blog-template/">Blog Template</a>
              <a href="../free-consultation/">Free Consultation</a>
              <a href="../calculator/">Calculator</a>
              <a href="./" aria-current="page">Blogs</a>
            </div>
          </nav>'''

          blogs_nav_css = '''
          .topnav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
          .topnav a{display:inline-flex;align-items:center;height:34px;padding:0 13px;border:1px solid var(--border);border-radius:999px;background:var(--white);color:var(--muted);text-decoration:none;font-size:13px;font-weight:800;transition:.18s}
          .topnav a:hover,.topnav a[aria-current="page"]{color:var(--green-dark);border-color:rgba(93,177,63,.36);background:rgba(93,177,63,.09)}
          @media(max-width:920px){.topbar{align-items:flex-start;border-radius:24px;flex-direction:column}.topnav{justify-content:flex-start}}
          '''

          if blogs_path.exists():
              text = blogs_path.read_text(encoding='utf-8')
              text, count = re.subn(
                  r'<nav\s+class="topbar"[^>]*>.*?</nav>',
                  global_nav,
                  text,
                  count=1,
                  flags=re.S,
              )
              if count != 1:
                  raise SystemExit('Could not replace the Blogs page top navigation.')
              if '.topnav{' not in text:
                  text = text.replace('</style>', blogs_nav_css + '\n</style>', 1)
              blogs_path.write_text(text, encoding='utf-8')

          def relative_blogs_href(path: Path) -> str:
              depth = len(path.parent.parts)
              return 'blogs/' if depth == 0 else ('../' * depth) + 'blogs/'

          changed = []
          for path in sorted(root.rglob('*.html')):
              text = path.read_text(encoding='utf-8')
              if path == blogs_path:
                  changed.append(str(path))
                  continue
              if 'class="topnav"' not in text:
                  continue
              if 'Brand basics' not in text and 'SolarMeister Brand Home' not in text:
                  continue

              match = re.search(r'(<div\s+class="topnav"[^>]*>)(.*?)(</div>)', text, flags=re.S)
              if not match:
                  continue
              nav_body = match.group(2)
              if re.search(r'>\s*Blogs\s*</a>', nav_body):
                  continue

              href = relative_blogs_href(path)
              indent_match = re.search(r'\n([ \t]*)<a\b', nav_body)
              indent = indent_match.group(1) if indent_match else '        '
              link = f'\n{indent}<a href="{href}">Blogs</a>'
              replacement = match.group(1) + nav_body.rstrip() + link + '\n' + match.group(3)
              text = text[:match.start()] + replacement + text[match.end():]
              path.write_text(text, encoding='utf-8')
              changed.append(str(path))

          print('Updated navigation files:')
          for path in changed:
              print(f' - {path}')

      - name: Verify Blogs navigation links
        shell: python
        run: |
          from pathlib import Path
          import re

          checked = []
          for path in sorted(Path('.').rglob('*.html')):
              text = path.read_text(encoding='utf-8')
              if 'class="topnav"' in text and ('Brand basics' in text or 'SolarMeister Brand Home' in text):
                  if not re.search(r'>\s*Blogs\s*</a>', text):
                      raise SystemExit(f'Missing Blogs link: {path}')
                  checked.append(str(path))

          blogs = Path('blogs/index.html').read_text(encoding='utf-8')
          required = [
              '../index.html', '../index.html#brand', '../favicon/', '../onesheets/',
              '../legal-footer/', '../blog-template/', '../free-consultation/',
              '../calculator/', 'href="./" aria-current="page">Blogs</a>'
          ]
          for item in required:
              if item not in blogs:
                  raise SystemExit(f'Blogs page global nav is missing: {item}')

          print(f'Validated {len(checked)} global navigation pages.')

      - name: Commit navigation updates and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-blogs-nav.yml
          git add '*.html' '**/*.html'
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add Blogs to global brand navigation"
          git push origin main
